name: EUserv Monthly Renew

on:
  schedule:
    - cron: '0 4 16 * *'      # 每月16号 北京时间中午12点 触发
  workflow_dispatch:          # 允许手动触发

jobs:
  renew:
    runs-on: ubuntu-latest
    permissions: write-all
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 新增：随机等待（中午12点到晚上8点之间随机运行）
      - name: Random Wait (12:00 ~ 20:00)
        run: |
          echo "当前北京时间: $(date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')"
          # 随机等待 0~8 小时（28800秒）
          sleep $((RANDOM % 28801))
          echo "随机等待结束，北京时间: $(date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')"

      - name: Run EUserv renew script
        env:
          EUSERV_EMAIL: ${{ secrets.EUSERV_EMAIL }}
          EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python euser_renew.py

# --- action保活 ---
      - name: Keep Alive Action
        run: |
          date > last_run.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git commit -m "Keep alive: $(date)" || echo "No changes to commit"
          git push
